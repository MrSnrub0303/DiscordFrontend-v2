<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AoE3 Civ Randomizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
  }

  #bg {
    position: fixed; inset: 0;
    background-image: url('Background.png');
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  /* ── Parchment backdrop ── */
  #parchment {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -70%) scale(1.1); /* ← adjust scale here */
    margin-top: 0px;                              /* ← adjust vertical offset here */
    z-index: 1;
    pointer-events: none;
    opacity: 100%; /* ### */
  }

  /* Master: fixed centred shell */
  #master {
    position: fixed;
    left: 50%;
    top: 50%;
    /* vertical offset fine-tuned below, set by JS */
    z-index: 5;
  }

  /* Inner: relative, so #top-ui-wrap can be absolute within it */
  #inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Flag track — width/height set by JS */
  #flag-area {
    position: relative;
    overflow: hidden;

    /* edge + bottom fade */
    mask-image:
      linear-gradient(to bottom, black 95%, transparent 100%),
      linear-gradient(to right,  transparent 0%, black 12%, black 88%, transparent 100%);
    mask-composite: intersect;

    -webkit-mask-image:
      linear-gradient(to bottom, black 95%, transparent 100%),
      linear-gradient(to right,  transparent 0%, black 12%, black 88%, transparent 100%);
    -webkit-mask-composite: source-in;
  }

  #strip {
    position: absolute;
    top: 0; left: 0;
    display: flex;
    align-items: center;
    will-change: transform;
  }

  .slot { /* ### */
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    top: 10px;
  }

  .slot img {
    border-radius: 50%;
    object-fit: cover;
    display: block;
    flex-shrink: 0;
    clip-path: circle(50%);
  }

  /* Top_UI overlay — size/position set by JS */
  #top-ui-wrap {
    position: absolute;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 10;
  }

  #top-ui-wrap img.top-ui-img {
    display: block;
    /* width and height both set explicitly by JS to correct the oval distortion */
  }

  /* Panel text — position set by JS */
  #panel-text {
    position: absolute;
    left: 50%;
    transform: translate(-50%, -50%);
    white-space: nowrap;
    font-family: 'Palatino Linotype', Palatino, Georgia, serif;
    font-weight: bold;
    color: #f0d070;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 2px 8px rgba(0,0,0,1), 0 0 14px rgba(200,160,50,0.4);
    pointer-events: none;
    z-index: 11;
  }

  /* Spin button wrap — margin-top set by JS */
  #spin-btn-wrap {
    z-index: 12;
    position: relative;
  }

  #spin-btn {
    background: none; border: none; padding: 0;
    cursor: pointer; display: block;
    transition: transform 0.12s, filter 0.12s;
  }
  #spin-btn:hover  { transform: scale(1.06); filter: brightness(1.18); }
  #spin-btn:active { transform: scale(0.96); }
  #spin-btn.hidden { visibility: hidden; pointer-events: none; }

  /* ── Mode toggle ── */
  #mode-toggle {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 12px;
    user-select: none;
  }

  .toggle-option {
    display: flex;
    align-items: center;
    gap: 7px;
    cursor: pointer;
    font-family: 'Palatino Linotype', Palatino, Georgia, serif;
    font-size: 16px; /* 13px */
    font-weight: bold;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #f0d070; /* #c8a040 */
    text-shadow: 0 1px 4px rgba(0,0,0,0.8);
    white-space: nowrap;
  }

  .toggle-option img.checkbox-img {
    width: 28px; /* 28px */
    height: 28px; /* 28px */
    display: block;
    transition: filter 0.15s;
  }

  .toggle-option:hover img.checkbox-img {
    filter: brightness(1.2);
  }

  /* ── Corner logo ── */
  #corner-logo {
    position: fixed;
    top: 16px;
    left: 16px;
    width: 16vw;        /* ← change this percentage to resize the logo */
    height: auto;
    z-index: 100;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="bg"></div>
<img id="corner-logo" src="aoe3_de_logo.png" alt="AoE3 DE">
<img id="parchment" src="Parchment.png" alt="">

<div id="mode-toggle">
  <div class="toggle-option" id="opt-civs">
    <img class="checkbox-img" id="cb-civs" src="checkbox_on.png" alt="">
    <span>Civs</span>
  </div>
  <div class="toggle-option" id="opt-maps">
    <img class="checkbox-img" id="cb-maps" src="checkbox_off.png" alt="">
    <span>Maps</span>
  </div>
</div>

<div id="master">
  <div id="inner">
    <div id="flag-area">
      <div id="strip"></div>
    </div>
    <div id="top-ui-wrap">
      <img class="top-ui-img" src="Top_UI.png" alt="">
      <span id="panel-text">• • •</span>
    </div>
    <div id="spin-btn-wrap">
      <button id="spin-btn"><img src="SpinButton.png" alt="Spin!"></button>
    </div>
  </div>
</div>

<script>
// ═════════════════════════════════════════════════════════════════════════════
// SINGLE SOURCE OF TRUTH
//
// Top_UI.png pixel analysis (1439 × 1573 px):
//   Ring inner horizontal diam = 1309 px  (cols 65–1374)
//   Ring inner vertical   diam = 1239 px  (rows 48–1287)
//   Ring centre col = 719,  row = 667
//   Panel centre row = 1402
//
//   The ring is NOT circular in the raw image (1309 wide × 1239 tall).
//   To display it as a perfect circle on screen we must display the image
//   at a width/height ratio that equalises the two diameters:
//     displayed_horiz = TOP_UI_W  * (1309/1439)
//     displayed_vert  = TOP_UI_H  * (1239/1573)
//     setting equal  → TOP_UI_H  = TOP_UI_W * (1309/1439) * (1573/1239)
//                                = TOP_UI_W * 1.15567
//
//   Fractions used after applying the corrected height:
//     RING_H_FRAC   = 1309/1439 = 0.90966  (horizontal inner / img width)
//     RING_V_FRAC   = 1239/1573 = 0.78767  (vertical   inner / img height)
//     RING_CY_FRAC  = 667/1573  = 0.42403  (ring centre row  / img height)
//     PANEL_CY_FRAC = 1402/1573 = 0.89129  (panel centre row / img height)
//
// Set RING_PX = desired on-screen diameter of the ring (CSS px).
// ═════════════════════════════════════════════════════════════════════════════

const RING_PX        = 300;
const RING_H_FRAC    = 1309 / 1439;   // horiz inner diam / img width
const RING_V_FRAC    = 1239 / 1573;   // vert  inner diam / img height
const RING_CY_FRAC   = 667  / 1573;
const PANEL_CY_FRAC  = 1402 / 1573;

// Corrected display dimensions so ring appears as a perfect circle
const TOP_UI_W  = RING_PX / RING_H_FRAC;
const TOP_UI_H  = TOP_UI_W * (1573 / 1439);
const RING_CY   = TOP_UI_H * RING_CY_FRAC;
const PANEL_CY  = TOP_UI_H * PANEL_CY_FRAC;

// Flag-area: height = RING_PX, centre = RING_PX/2
const FLAG_H     = RING_PX;
const FLAG_CY    = FLAG_H / 2;

// Top_UI image top offset from #inner top (flag-area top = 0)
const TOP_UI_TOP = FLAG_CY - RING_CY;                   // usually a small negative

// How far image overhangs below flag-area
const OVERHANG   = (TOP_UI_TOP + TOP_UI_H) - FLAG_H;

// Mode — declared here so diamAt can reference it at call time
let currentMode = 'civs';

// Centre flag diameter = slightly larger than RING_PX so it presses against
// the ring border with zero gap. Clip keeps it circular within the ring.
const CENTRE_DIAM     = Math.round(RING_PX * 1.235);
const EDGE_DIAM       = Math.round(RING_PX * 0.50);
const CENTRE_DIAM_MAP = Math.round(RING_PX * 1.12);
const EDGE_DIAM_MAP   = Math.round(RING_PX * 0.50);

// Track & slot sizing
const TRACK_W    = 1290;
const CENTER_X   = TRACK_W / 2;
const SLOT_W     = Math.round(RING_PX * 0.65);          // slot pitch ≈ 72% of ring
const FONT_SIZE  = Math.round(RING_PX * 0.077);         // ~18px at RING_PX=240

// ─────────────────────────────────────────────────────────────────────────────
// APPLY LAYOUT TO DOM
// ─────────────────────────────────────────────────────────────────────────────
const masterEl   = document.getElementById('master');
const innerEl    = document.getElementById('inner');
const flagAreaEl = document.getElementById('flag-area');
const stripEl    = document.getElementById('strip');
const topUIWrap  = document.getElementById('top-ui-wrap');
const topUIImg   = topUIWrap.querySelector('img.top-ui-img');
const panelText  = document.getElementById('panel-text');
const spinBtnWrap= document.getElementById('spin-btn-wrap');
const spinBtnImg = document.querySelector('#spin-btn img');

// Master: centred, shift up a little from screen centre
masterEl.style.transform = 'translate(-50%, -52%)';

// Inner width = track width
innerEl.style.width = TRACK_W + 'px';

// Flag area
flagAreaEl.style.width  = TRACK_W + 'px';
flagAreaEl.style.height = FLAG_H + 'px';

// Strip
stripEl.style.height = FLAG_H + 'px';

// Top_UI wrap
topUIWrap.style.left   = '50%';
topUIWrap.style.top    = TOP_UI_TOP + 'px';
topUIWrap.style.width  = TOP_UI_W + 'px';
topUIWrap.style.height = TOP_UI_H + 'px';
topUIImg.style.width   = TOP_UI_W + 'px';
topUIImg.style.height  = TOP_UI_H + 'px';

// Panel text: positioned at panel centre within #top-ui-wrap
panelText.style.top      = PANEL_CY + 'px';
panelText.style.fontSize = FONT_SIZE + 'px';

// Spin button: margin pushes it below the image overhang
spinBtnWrap.style.marginTop = Math.round(OVERHANG + 8) + 'px';
spinBtnImg.style.width = Math.round(RING_PX * 0.92) + 'px';

// ─────────────────────────────────────────────────────────────────────────────
// CIVS
// ─────────────────────────────────────────────────────────────────────────────
const CIVS = [
  { file: 'flag_hc_american.png',   name: 'American' },
  { file: 'flag_hc_aztec.png',      name: 'Aztec' },
  { file: 'flag_hc_british.png',    name: 'British' },
  { file: 'flag_hc_chinese.png',    name: 'Chinese' },
  { file: 'flag_hc_danish.png',     name: 'Danish' },
  { file: 'flag_hc_dutch.png',      name: 'Dutch' },
  { file: 'flag_hc_ethiopian.png',  name: 'Ethiopian' },
  { file: 'flag_hc_french.png',     name: 'French' },
  { file: 'flag_hc_german.png',     name: 'German' },
  { file: 'flag_hc_hausa.png',      name: 'Hausa' },
  { file: 'flag_hc_inca.png',       name: 'Inca' },
  { file: 'flag_hc_indian.png',     name: 'Indian' },
  { file: 'flag_hc_iroquois.png',   name: 'Haudenosaunee' },
  { file: 'flag_hc_italian.png',    name: 'Italian' },
  { file: 'flag_hc_japanese.png',   name: 'Japanese' },
  { file: 'flag_hc_maltese.png',    name: 'Maltese' },
  { file: 'flag_hc_mexican.png',    name: 'Mexican' },
  { file: 'flag_hc_ottoman.png',    name: 'Ottoman' },
  { file: 'flag_hc_polish.png',     name: 'Polish' },
  { file: 'flag_hc_portuguese.png', name: 'Portuguese' },
];
const N = CIVS.length;

// ─────────────────────────────────────────────────────────────────────────────
// BUILD STRIP
// ─────────────────────────────────────────────────────────────────────────────
const COPIES   = 21;
const TOTAL    = N * COPIES;
const START_POS = Math.floor(COPIES / 2) * N;

stripEl.style.width = (TOTAL * SLOT_W) + 'px';

const imgEls = [];

for (let i = 0; i < TOTAL; i++) {
  const civ  = CIVS[i % N];
  const slot = document.createElement('div');
  slot.className = 'slot';
  slot.style.width  = SLOT_W + 'px';
  slot.style.height = FLAG_H + 'px';

  const img = document.createElement('img');
  if (i === START_POS) {
    img.src = 'flag_hc_random.png';
    img.alt = '?';
    img.dataset.isRandom = '1';
  } else {
    img.src = civ.file;
    img.alt = civ.name;
  }
  img.draggable = false;
  // Random flag at centre starts at full size; all others start at edge size
  // (render() will immediately correct all sizes, but this avoids a one-frame flash)
  const initDiam = (i === START_POS) ? CENTRE_DIAM : EDGE_DIAM;
  img.style.width  = initDiam + 'px';
  img.style.height = initDiam + 'px';

  slot.appendChild(img);
  stripEl.appendChild(slot);
  imgEls.push(img);
}

// ─────────────────────────────────────────────────────────────────────────────
// SIZE CURVE  — dist=0 → CENTRE_DIAM, dist→∞ → EDGE_DIAM
// ─────────────────────────────────────────────────────────────────────────────
function diamAt(distSlots) {
  const cDiam = currentMode === 'maps' ? CENTRE_DIAM_MAP : CENTRE_DIAM;
  const eDiam = currentMode === 'maps' ? EDGE_DIAM_MAP   : EDGE_DIAM;
  const t = Math.max(0, 1 - Math.abs(distSlots) / 2.6);
  return eDiam + (cDiam - eDiam) * Math.pow(t, 1.8);
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render(pos) {
  const stripLeft = CENTER_X - (pos * SLOT_W + SLOT_W / 2);
  stripEl.style.transform = `translateX(${stripLeft}px)`;

  const count = imgEls.length;
  for (let i = 0; i < count; i++) {
    const screenX   = stripLeft + i * SLOT_W + SLOT_W / 2;
    const distSlots = (screenX - CENTER_X) / SLOT_W;
    const img       = imgEls[i];

    if (Math.abs(distSlots) > 3.6) {
      img.style.visibility = 'hidden';
      continue;
    }
    img.style.visibility = 'visible';

    const diam = diamAt(distSlots);
    img.style.width  = diam + 'px';
    img.style.height = diam + 'px';

    const t = Math.max(0, 1 - Math.abs(distSlots) / 2.6);
    img.parentElement.style.filter = `drop-shadow(0 24px 17px rgba(0,0,0,0.9))`;
    img.parentElement.style.zIndex = Math.round(t * 25);
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────────────────
let posSlot   = START_POS;
let spinning  = false;
let firstSpin = true;

const spinBtn = document.getElementById('spin-btn');

render(posSlot);
// Belt-and-braces: ensure the random flag is exactly CENTRE_DIAM
imgEls[START_POS].style.width  = CENTRE_DIAM + 'px';
imgEls[START_POS].style.height = CENTRE_DIAM + 'px';
imgEls[START_POS].style.visibility = 'visible';

// ─────────────────────────────────────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────────────────────────────────────
let audioCtx        = null;
let tickBuffer      = null;
let landBuffer      = null;
let smallBtnBuffer  = null;
let bigBtnBuffer    = null;

function ensureAudio() {
  if (audioCtx) return;

function playTick() {
  if (!audioCtx || !tickBuffer) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const src = audioCtx.createBufferSource();
  src.buffer = tickBuffer;

  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 1; // keep original volume
  src.connect(gainNode);
  gainNode.connect(audioCtx.destination);

  // fade out ONLY in the last 2ms to remove click
  const now = audioCtx.currentTime;
  const fadeTime = 0.002; // 2 ms
  gainNode.gain.setValueAtTime(1, now);
  gainNode.gain.linearRampToValueAtTime(0, now + tickBuffer.duration, now + tickBuffer.duration + fadeTime);

  src.start(0);
}

function playLand() {
  if (!audioCtx || !landBuffer) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const src = audioCtx.createBufferSource();
  src.buffer = landBuffer;
  const gainNode = audioCtx.createGain();
  gainNode.gain.value = 0.5; // reduce volume to 50%
  src.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  src.start(0);
}

  gainNode.connect(audioCtx.destination);

// ─────────────────────────────────────────────────────────────────────────────
// MODE TOGGLE
// ─────────────────────────────────────────────────────────────────────────────

function getDataset() {
  return currentMode === 'civs' ? CIVS : MAPS;
}

function getRandomFile() {
  return currentMode === 'civs' ? 'flag_hc_random.png' : MAPS[Math.floor(Math.random() * MAPS.length)].file;
}

function rebuildStrip() {
  // Clear the strip
  while (stripEl.firstChild) stripEl.removeChild(stripEl.firstChild);
  imgEls.length = 0;

  const DATA = getDataset();
  const n = DATA.length;
  const copies = COPIES;
  const total = n * copies;
  const startPos = Math.floor(copies / 2) * n;

  stripEl.style.width = (total * SLOT_W) + 'px';

  for (let i = 0; i < total; i++) {
    const item = DATA[i % n];
    const slot = document.createElement('div');
    slot.className = 'slot';
    slot.style.width  = SLOT_W + 'px';
    slot.style.height = FLAG_H + 'px';

    const img = document.createElement('img');
    if (i === startPos) {
      if (currentMode === 'civs') {
        img.src = 'flag_hc_random.png';
        img.alt = '?';
        img.dataset.isRandom = '1';
      } else {
        img.src = 'unknown_mini.png';
        img.alt = '?';
        img.dataset.isRandom = '1';
      }
    } else {
      img.src  = item.file;
      img.alt  = item.name;
    }
    img.draggable = false;
    const cDiam = currentMode === 'maps' ? CENTRE_DIAM_MAP : CENTRE_DIAM;
    const eDiam = currentMode === 'maps' ? EDGE_DIAM_MAP   : EDGE_DIAM;
    const initDiam = (i === startPos) ? cDiam : eDiam;
    img.style.width  = initDiam + 'px';
    img.style.height = initDiam + 'px';

    slot.appendChild(img);
    stripEl.appendChild(slot);
    imgEls.push(img);
  }

  return { n, startPos };
}

(function initToggle() {
  const optCivs = document.getElementById('opt-civs');
  const optMaps = document.getElementById('opt-maps');
  const cbCivs  = document.getElementById('cb-civs');
  const cbMaps  = document.getElementById('cb-maps');

  function activateMode(mode) {
    if (mode === currentMode || spinning) return;
    currentMode = mode;

    if (mode === 'civs') {
      cbCivs.src = 'checkbox_on.png';
      cbMaps.src = 'checkbox_off.png';
    } else {
      cbMaps.src = 'checkbox_on.png';
      cbCivs.src = 'checkbox_off.png';
    }

    // Rebuild strip and reset state
    firstSpin = true;
    const { n, startPos } = rebuildStrip();
    posSlot = startPos;
    render(posSlot);
    const cDiamFix = currentMode === 'maps' ? CENTRE_DIAM_MAP : CENTRE_DIAM;
    imgEls[startPos].style.width  = cDiamFix + 'px';
    imgEls[startPos].style.height = cDiamFix + 'px';
    imgEls[startPos].style.visibility = 'visible';
    panelText.textContent = '• • •';
    spinBtn.classList.remove('hidden');
  }

  optCivs.addEventListener('click', () => { ensureAudio(); playSmallBtn(); activateMode('civs'); });
  optMaps.addEventListener('click', () => { ensureAudio(); playSmallBtn(); activateMode('maps'); });
})();


// ─────────────────────────────────────────────────────────────────────────────
// EASING — power controls deceleration curve (higher = more aggressive slowdown)
function easeOutPow(t, power) {
  return t >= 1 ? 1 : 1 - Math.pow(1 - t, power);
}

// ─────────────────────────────────────────────────────────────────────────────
// SPIN
// ─────────────────────────────────────────────────────────────────────────────

spinBtn.addEventListener('click', () => {
  if (spinning) return;
  ensureAudio();
  playBigBtn();
  doSpin();
});

function doSpin() {
  spinning = true;
  spinBtn.classList.add('hidden');
  panelText.textContent = '• • •';

  const DATA = getDataset();
  const N_cur = DATA.length;

  if (firstSpin && currentMode === 'civs') {
    const randImg = imgEls[posSlot];
    if (randImg && randImg.dataset.isRandom) {
      randImg.src = DATA[posSlot % N_cur].file;
      randImg.alt = DATA[posSlot % N_cur].name;
      delete randImg.dataset.isRandom;
    }
    firstSpin = false;
  } else if (firstSpin && currentMode === 'maps') {
    const randImg = imgEls[posSlot];
    if (randImg && randImg.dataset.isRandom) {
      randImg.src = DATA[posSlot % N_cur].file;
      randImg.alt = DATA[posSlot % N_cur].name;
      delete randImg.dataset.isRandom;
    }
    firstSpin = false;
  } else {
    firstSpin = false;
  }

  // ── Variable spin duration: 4s – 6s ──────────────────────────────────────
  const SPIN_MS = 4000 + Math.random() * 2000;

  // ── Variable deceleration: higher power = snappier slowdown (feels faster
  //    peak speed); lower power = more gradual coast (feels slower overall).
  //    Range 3.2 – 5.0 (original was effectively ~4).
  const easePower = 3.2 + Math.random() * 1.8;

  // ── Tense-landing flavour (chosen once per spin) ─────────────────────────
  //    0 = normal landing
  //    1 = almost-miss: nearly lands on next slot, then ticks back
  //    2 = photo-finish: just barely ticks forward onto target
  const tenseFlavour = Math.random() < 0.55 ? 0          // ~55% normal
                     : Math.random() < 0.5  ? 1          // ~22.5% overshoot
                     : 2;                                 // ~22.5% photo-finish

  const targetIdx = Math.floor(Math.random() * N_cur);
  const curIdx    = posSlot % N_cur;

  let stepsToTarget = ((targetIdx - curIdx) + N_cur) % N_cur;
  if (stepsToTarget === 0) stepsToTarget = N_cur;

  // Extra loops are always an exact integer multiple of N — guarantees
  // endPos % N === targetIdx with no floating-point drift
  const extraLoops = 2 + Math.floor(Math.random() * 3);  // 2, 3, or 4
  const totalSlots = extraLoops * N_cur + stepsToTarget;

  // ── Tense-landing: add a fractional offset that animates away before end ──
  // overshoot: land a bit past centre of target slot then spring back
  // photo-finish: approach from just before centre of target slot
  // Clamped to ±0.49 so we NEVER visually cross into the neighbouring slot.
  const tenseMag = tenseFlavour !== 0 ? Math.min(0.49, 0.28 + Math.random() * 0.18) : 0;

  // Phase split: first PHASE_END of the duration does the main spin + overshoot,
  // the remaining time springs back (or arrives) at the true landing position.
  const PHASE_END  = 0.80 + Math.random() * 0.08;   // 80–88% of total time

  const startPos  = posSlot;
  const endPos    = startPos + totalSlots;
  const startTime = performance.now();
  // Track the last whole-integer crossed (slot centre = whole number position).
  // Initialise to the floor so the very first centre-cross triggers correctly.
  let   lastTick  = Math.floor(startPos);

  function frame(now) {
    const elapsed  = now - startTime;
    const progress = Math.min(elapsed / SPIN_MS, 1);

    let curPos;

    if (tenseFlavour === 0 || progress >= 1) {
      // Normal: straightforward eased approach
      const eased = easeOutPow(progress, easePower);
      curPos = startPos + totalSlots * eased;
    } else if (progress < PHASE_END) {
      // Phase 1: spin to the tense position (just past or just before target)
      const t1 = progress / PHASE_END;
      const eased = easeOutPow(t1, easePower);
      const tensedSlots = tenseFlavour === 1
        ? totalSlots + tenseMag    // overshoot: land a bit past target
        : totalSlots - tenseMag;   // photo-finish: land a bit before target
      curPos = startPos + tensedSlots * eased;
    } else {
      // Phase 2: spring from tense position back/forward to true landing
      const t2Raw  = (progress - PHASE_END) / (1 - PHASE_END);
      // Use a gentle ease-in-out for the correction spring
      const t2     = t2Raw < 0.5
        ? 2 * t2Raw * t2Raw
        : 1 - Math.pow(-2 * t2Raw + 2, 2) / 2;

      const tensedSlots = tenseFlavour === 1
        ? totalSlots + tenseMag
        : totalSlots - tenseMag;

      const phase1End = easeOutPow(1, easePower);  // = 1, but kept for clarity
      const tensedPos = startPos + tensedSlots * phase1End;
      const truePos   = startPos + totalSlots;

      curPos = tensedPos + (truePos - tensedPos) * t2;
    }

    // Fire the tick exactly when curPos crosses a whole integer —
    // that's when the slot centre passes through the visual centre point.
    const curSlotInt = Math.floor(curPos);
    if (curSlotInt !== lastTick) {
      lastTick = curSlotInt;
      playTick();
    }

    render(curPos);

    if (progress < 1) {
      requestAnimationFrame(frame);
      return;
    }

    // Land and re-anchor to middle of buffer
    posSlot = Math.floor(COPIES / 2) * N_cur + (endPos % N_cur);
    render(posSlot);

    panelText.textContent = DATA[targetIdx].name;
    playLand();
    spinning = false;
    spinBtn.classList.remove('hidden');
  }

  requestAnimationFrame(frame);
}
